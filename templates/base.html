<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Event Manager{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Event Manager</a>
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <span class="navbar-text text-white me-3">Ciao, {{ user.username }}</span>
                    {% if user.role == 'organizer' %}
                        <a class="nav-link text-white" href="{% url 'events:create' %}">Crea Evento</a>
                    {% endif %}
                    <a class="nav-link text-white" href="{% url 'accounts:logout' %}">Logout</a>
                {% else %}
                    <a class="nav-link text-white" href="{% url 'accounts:login' %}">Login</a>
                    <a class="nav-link text-white" href="{% url 'accounts:register' %}">Registrati</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
