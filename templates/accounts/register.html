{% extends 'base.html' %}

{% block title %}Registrati{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h2 class="mb-4">Registrati</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100">Registrati</button>
        </form>
        <p class="mt-3">Hai già un account? <a href="{% url 'accounts:login' %}">Accedi</a></p>
    </div>
</div>
{% endblock %}
